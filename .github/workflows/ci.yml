name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build dev

      - name: Install dependencies
        run: docker compose run --rm dev npm ci

      - name: Lint
        run: docker compose run --rm dev npm run lint

      - name: Typecheck
        run: docker compose run --rm dev npm run typecheck

      - name: Test
        run: docker compose run --rm dev npm run test:coverage

      - name: Build
        run: docker compose run --rm dev npm run build

      - name: NestJS consumer smoke
        run: docker compose run --rm dev npm run smoke:nestjs

      - name: Prisma consumer smoke
        run: docker compose run --rm dev npm run smoke:prisma

      - name: Stop databases
        if: always()
        run: docker compose down -v
